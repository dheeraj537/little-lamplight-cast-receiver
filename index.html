<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Little Lamplight — Cast Receiver</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --night: #332B4E;
    --night-deep: #2A2342;
    --night-soft: #4A4170;
    --lamp: #FFC857;
    --coral: #F08A7E;
    --milk: #FFF9F0;
    --milk-soft: rgba(255,249,240,0.72);
    --milk-faint: rgba(255,249,240,0.5);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: var(--night);
    color: var(--milk);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  /* 10-foot UI: generous safe-area margin so nothing sits under a TV's overscan crop */
  .safe {
    position: absolute; inset: 5%;
    display: flex;
    flex-direction: column;
  }

  /* ---------- Idle screen ---------- */
  #idle {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    transition: opacity 0.6s ease;
  }
  #idle .moon-badge { width: 140px; height: 140px; margin-bottom: 28px; }
  #idle h1 { font-size: 3.4vw; margin: 0 0 12px; font-weight: 800; }
  #idle p { font-size: 1.6vw; color: var(--milk-soft); margin: 0; }
  .dot { fill: var(--milk); opacity: 0.7; }

  /* ---------- Reading screen ---------- */
  #reading {
    position: absolute; inset: 0;
    display: none;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  #reading.visible { display: flex; opacity: 1; }
  .stage {
    display: flex;
    align-items: center;
    gap: 4vw;
    width: 100%;
    height: 100%;
  }
  .scene-pane {
    flex: 0 0 42%;
    display: flex; align-items: center; justify-content: center;
  }
  .scene-pane svg { width: 100%; height: auto; max-height: 78vh; }

  .content-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-width: 0;
  }
  .book-title {
    font-size: 1.5vw;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--lamp);
    font-weight: 700;
    margin-bottom: 1.4vw;
  }
  .sentence {
    background: var(--milk);
    color: var(--night-deep);
    border-radius: 28px;
    padding: 2.6vw 3vw;
    font-size: 4.4vw;
    font-weight: 800;
    line-height: 1.25;
    text-wrap: balance;
  }
  .sentence .word { transition: background 0.15s ease; border-radius: 10px; padding: 0 6px; }
  .sentence .word.hl { background: var(--lamp); }
  .sentence .word.target { text-decoration: underline; text-decoration-color: var(--coral); text-decoration-thickness: 5px; text-underline-offset: 8px; }

  .phonetic {
    margin-top: 1.6vw;
    font-size: 1.5vw;
    color: var(--milk-soft);
  }

  .try-together {
    margin-top: 2vw;
    border: 3px dashed var(--coral);
    background: rgba(240,138,126,0.14);
    border-radius: 20px;
    padding: 1.4vw 1.8vw;
  }
  .try-together .lbl {
    font-size: 1.2vw;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--coral);
    font-weight: 800;
    display: block;
    margin-bottom: 0.4vw;
  }
  .try-together .txt { font-size: 1.9vw; }

  .hi-line { margin-top: 1.4vw; font-size: 1.35vw; color: var(--milk-faint); }

  .page-dots { position: absolute; bottom: 5%; left: 5%; display: flex; gap: 10px; }
  .page-dots span {
    width: 12px; height: 12px; border-radius: 50%;
    background: rgba(255,249,240,0.25);
  }
  .page-dots span.active { background: var(--lamp); }

  /* ---------- Celebration burst ---------- */
  #celebrate {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s ease;
    z-index: 10;
  }
  #celebrate.burst { opacity: 1; }
  #celebrate .glow {
    width: 180px; height: 180px; border-radius: 50%;
    background: rgba(255,200,87,0.28);
    display: flex; align-items: center; justify-content: center;
    transform: scale(0.4);
    transition: transform 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  #celebrate.burst .glow { transform: scale(1); }
  #celebrate .glow svg { width: 70px; height: 70px; }
  #celebrate .particle {
    position: absolute;
    width: 26px; height: 26px;
    opacity: 0;
    transform: translate(0, 0) scale(0.6);
    transition: transform 0.55s ease-out, opacity 0.55s ease-out;
  }
  #celebrate.burst .particle { opacity: 1; transform: var(--to) scale(1); }

  /* ---------- Copycat screen ---------- */
  #copycat {
    position: absolute; inset: 0;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.4s ease;
  }
  #copycat.visible { display: flex; opacity: 1; }
  #copycatBubble {
    max-width: 70%;
    background: var(--milk); color: var(--night-deep);
    font-size: 2.6vw; font-weight: 800; text-align: center;
    padding: 1.4vw 2.6vw; border-radius: 44px;
    opacity: 0; transform: translateY(12px);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  #copycatBubble.show { opacity: 1; transform: translateY(0); }
  #copycatCatWrap { animation: catbob 2.6s ease-in-out infinite; margin: 2.4vw 0; }
  #copycatCat { width: 32vw; max-width: 440px; }
  #copycatCat svg { width: 100%; height: auto; display: block; }
  #copycatPrompt {
    border: 4px dashed var(--coral);
    background: rgba(240,138,126,0.14);
    border-radius: 22px; padding: 1.2vw 2.6vw; font-size: 2vw;
  }
  #copycatPrompt b { color: var(--lamp); }

  @keyframes catbob { 0%, 100% { transform: translateY(7px); } 50% { transform: translateY(-9px); } }
  .cat-mouth-open { opacity: 0; transform-box: fill-box; transform-origin: center; }
  .talking .cat-mouth-open { opacity: 1; animation: chomp 0.34s ease-in-out infinite; }
  .talking .cat-mouth-closed { opacity: 0; }
  @keyframes chomp { 0%, 100% { transform: scaleY(0.25); } 50% { transform: scaleY(1); } }

  #copycatCat.act-jump { animation: cjump 0.6s ease; }
  #copycatCat.act-spin { animation: cspin 0.8s ease-in-out; }
  #copycatCat.act-dance { animation: cdance 0.9s ease-in-out; }
  #copycatCat.act-meow { animation: cmeow 0.5s ease; }
  @keyframes cjump { 0% { transform: translateY(0); } 45% { transform: translateY(-18%); } 60% { transform: translateY(-18%); } 100% { transform: translateY(0); } }
  @keyframes cspin { to { transform: rotate(360deg); } }
  @keyframes cdance { 0%, 100% { transform: rotate(0); } 20% { transform: rotate(15deg); } 40% { transform: rotate(-15deg); } 60% { transform: rotate(15deg); } 80% { transform: rotate(-15deg); } }
  @keyframes cmeow { 0%, 100% { transform: scale(1); } 40% { transform: scale(1.14); } }
</style>
</head>
<body>

  <div id="celebrate">
    <div class="glow"><svg viewBox="0 0 40 40"><path d="M20 2 L24 16 L38 20 L24 24 L20 38 L16 24 L2 20 L16 16 Z" fill="#FFC857"/></svg></div>
  </div>
  <audio id="sfxAudio" preload="auto"></audio>

  <div id="idle">
    <svg class="moon-badge" viewBox="0 0 140 140">
      <circle cx="70" cy="70" r="70" fill="var(--night-deep)"/>
      <circle cx="70" cy="70" r="34" fill="var(--lamp)"/>
    </svg>
    <h1>Little Lamplight</h1>
    <p>Waiting for story time to begin&hellip;</p>
  </div>

  <div id="reading">
    <div class="safe">
      <div class="stage">
        <div class="scene-pane" id="scenePane"></div>
        <div class="content-pane">
          <div class="book-title" id="bookTitle"></div>
          <div class="sentence" id="sentence"></div>
          <div class="phonetic" id="phonetic"></div>
          <div class="try-together">
            <span class="lbl">Try together</span>
            <span class="txt" id="prompt"></span>
          </div>
          <div class="hi-line" id="hiLine"></div>
        </div>
      </div>
    </div>
    <div class="page-dots" id="pageDots"></div>
  </div>

  <div id="copycat">
    <div id="copycatBubble"></div>
    <div id="copycatCatWrap"><div id="copycatCat"></div></div>
    <div id="copycatPrompt"></div>
  </div>

<script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
<script>
  var NAMESPACE = 'urn:x-cast:com.littlelamplight.app';

  // ---- Scenes: same shapes/colors as the app's Scene.js, translated to plain SVG ----
  var T = { night: '#332B4E', lamp: '#FFC857', coral: '#F08A7E', milk: '#FFF9F0', ink: '#2E2A3B', skin: '#F5C9A4' };

  function svg(inner) {
    return '<svg viewBox="0 0 300 190" xmlns="http://www.w3.org/2000/svg">' + inner + '</svg>';
  }

  function starDots() {
    return '<circle cx="55" cy="50" r="2" fill="' + T.milk + '" opacity="0.7"/>' +
           '<circle cx="248" cy="65" r="2.4" fill="' + T.milk + '" opacity="0.6"/>';
  }

  var SCENES = {
    moon: svg(
      '<rect width="300" height="190" fill="' + T.night + '" rx="20"/>' +
      '<circle cx="150" cy="85" r="52" fill="' + T.lamp + '" opacity="0.16"/>' +
      '<circle cx="150" cy="85" r="40" fill="' + T.lamp + '"/>' +
      starDots() +
      '<circle cx="90" cy="40" r="2" fill="' + T.milk + '" opacity="0.8"/>' +
      '<circle cx="220" cy="140" r="2" fill="' + T.milk + '" opacity="0.7"/>'
    ),
    stars: svg(
      '<rect width="300" height="190" fill="' + T.night + '" rx="20"/>' +
      '<circle cx="90" cy="60" r="6" fill="' + T.lamp + '"/>' +
      '<circle cx="150" cy="40" r="4" fill="' + T.lamp + '"/>' +
      '<circle cx="205" cy="75" r="5" fill="' + T.lamp + '"/>' +
      '<circle cx="230" cy="115" r="3.5" fill="' + T.lamp + '"/>' +
      '<circle cx="75" cy="120" r="3" fill="' + T.lamp + '"/>' +
      starDots()
    ),
    cat: svg(
      '<rect width="300" height="190" fill="' + T.night + '" rx="20"/>' +
      '<ellipse cx="150" cy="140" rx="60" ry="34" fill="' + T.coral + '"/>' +
      '<circle cx="112" cy="98" r="26" fill="' + T.coral + '"/>' +
      '<path d="M92 82 L100 62 L112 84 Z" fill="' + T.coral + '"/>' +
      '<path d="M132 82 L124 62 L112 84 Z" fill="' + T.coral + '"/>' +
      '<circle cx="104" cy="98" r="2.5" fill="' + T.ink + '"/><circle cx="120" cy="98" r="2.5" fill="' + T.ink + '"/>' +
      starDots()
    ),
    child: svg(
      '<rect width="300" height="190" fill="' + T.night + '" rx="20"/>' +
      '<circle cx="150" cy="60" r="38" fill="' + T.lamp + '" opacity="0.16"/>' +
      '<circle cx="150" cy="98" r="34" fill="' + T.skin + '"/>' +
      '<path d="M120 84 Q150 60 180 84 Q150 74 120 84" fill="' + T.ink + '"/>' +
      '<circle cx="138" cy="96" r="4" fill="' + T.ink + '"/><circle cx="162" cy="96" r="4" fill="' + T.ink + '"/>' +
      '<path d="M140 110 Q150 118 160 110" stroke="' + T.ink + '" stroke-width="3.5" fill="none" stroke-linecap="round"/>' +
      '<path d="M105 175 Q150 130 195 175 Z" fill="' + T.coral + '"/>' +
      starDots()
    )
  };
  ['nose', 'eyes', 'tummy', 'toes'].forEach(function (part) {
    var ring = function (cx, cy, r) { return '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" stroke="' + T.lamp + '" stroke-width="3.5" fill="none"/>'; };
    var body = '<ellipse cx="150" cy="150" rx="46" ry="34" fill="' + T.coral + '"/>' + (part === 'tummy' ? ring(150, 150, 34) : '');
    var feet = '<ellipse cx="128" cy="184" rx="14" ry="7" fill="' + T.skin + '"/><ellipse cx="172" cy="184" rx="14" ry="7" fill="' + T.skin + '"/>' +
      (part === 'toes' ? ring(128, 184, 17) + ring(172, 184, 17) : '');
    var face = '<circle cx="150" cy="95" r="42" fill="' + T.skin + '"/>' +
      '<path d="M118 78 Q150 62 182 78 Q150 70 118 78" fill="' + T.ink + '"/>' +
      '<circle cx="136" cy="92" r="' + (part === 'eyes' ? 5.5 : 4) + '" fill="' + T.ink + '"/>' +
      '<circle cx="164" cy="92" r="' + (part === 'eyes' ? 5.5 : 4) + '" fill="' + T.ink + '"/>' +
      (part === 'eyes' ? ring(150, 92, 30) : '') +
      '<ellipse cx="150" cy="104" rx="' + (part === 'nose' ? 8 : 5) + '" ry="' + (part === 'nose' ? 6 : 4) + '" fill="#E8AD84"/>' +
      (part === 'nose' ? ring(150, 104, 16) : '') +
      '<path d="M136 114 Q150 122 164 114" stroke="' + T.ink + '" stroke-width="3.5" fill="none" stroke-linecap="round"/>';
    SCENES['baby' + part.charAt(0).toUpperCase() + part.slice(1)] = svg(
      '<rect width="300" height="190" fill="' + T.night + '" rx="20"/>' + starDots() + body + feet + face
    );
  });

  var NIGHT_SOFT = '#4A4170', NIGHT_DEEP = '#2A2342';
  ['wheels', 'beep', 'wave', 'home'].forEach(function (variant) {
    var busX = variant === 'home' ? -30 : 0;
    var ring = function (cx, cy, r) { return '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" stroke="' + T.lamp + '" stroke-width="3.5" fill="none"/>'; };
    var bus = '<g transform="translate(' + busX + ' 0)">' +
      '<rect x="70" y="68" width="160" height="70" rx="16" fill="' + T.coral + '"/>' +
      '<rect x="86" y="80" width="30" height="24" rx="6" fill="' + T.lamp + '"/>' +
      '<rect x="128" y="80" width="30" height="24" rx="6" fill="' + T.lamp + '"/>' +
      '<rect x="170" y="80" width="30" height="24" rx="6" fill="' + T.lamp + '"/>' +
      '<circle cx="108" cy="140" r="13" fill="' + T.ink + '"/><circle cx="108" cy="140" r="5" fill="' + T.milk + '"/>' +
      '<circle cx="192" cy="140" r="13" fill="' + T.ink + '"/><circle cx="192" cy="140" r="5" fill="' + T.milk + '"/>' +
      (variant === 'wheels' ? '<circle cx="108" cy="140" r="19" stroke="' + T.lamp + '" stroke-width="3.5" fill="none"/><circle cx="192" cy="140" r="19" stroke="' + T.lamp + '" stroke-width="3.5" fill="none"/>' : '') +
      (variant === 'beep' ? '<path d="M240 96 Q252 103 240 110" stroke="' + T.lamp + '" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M250 88 Q268 103 250 118" stroke="' + T.lamp + '" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>' : '') +
      (variant === 'wave' ? '<path d="M195 98 Q222 86 244 74" stroke="' + T.skin + '" stroke-width="9" fill="none" stroke-linecap="round"/><circle cx="248" cy="72" r="10" fill="' + T.skin + '"/><circle cx="248" cy="72" r="17" stroke="' + T.lamp + '" stroke-width="3" fill="none"/><path d="M262 58 Q270 72 262 86" stroke="' + T.lamp + '" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>' : '') +
      '</g>';
    var house = variant === 'home'
      ? '<rect x="228" y="106" width="46" height="42" rx="6" fill="' + NIGHT_SOFT + '"/><path d="M222 110 L251 84 L280 110 Z" fill="' + T.coral + '"/><rect x="244" y="122" width="14" height="14" rx="3" fill="' + T.lamp + '"/>'
      : '';
    SCENES['bus' + variant.charAt(0).toUpperCase() + variant.slice(1)] = svg(
      '<rect width="300" height="190" fill="' + T.night + '" rx="20"/>' + starDots() +
      '<rect x="20" y="148" width="260" height="5" rx="2.5" fill="' + NIGHT_SOFT + '"/>' + bus + house
    );
  });

  ['hungry', 'fish', 'yum', 'happy'].forEach(function (variant) {
    var smile = (variant === 'happy' || variant === 'yum');
    var cat = '<ellipse cx="120" cy="140" rx="52" ry="30" fill="' + T.coral + '"/>' +
      '<circle cx="120" cy="92" r="30" fill="' + T.coral + '"/>' +
      '<path d="M96 74 L104 50 L118 76 Z" fill="' + T.coral + '"/>' +
      '<path d="M144 74 L136 50 L122 76 Z" fill="' + T.coral + '"/>' +
      '<circle cx="110" cy="90" r="3.5" fill="' + T.ink + '"/><circle cx="130" cy="90" r="3.5" fill="' + T.ink + '"/>' +
      '<path d="M88 98 L102 100 M88 106 L102 104" stroke="' + T.ink + '" stroke-width="2" stroke-linecap="round"/>' +
      '<path d="M152 98 L138 100 M152 106 L138 104" stroke="' + T.ink + '" stroke-width="2" stroke-linecap="round"/>' +
      (smile
        ? '<path d="M112 102 Q120 110 128 102" stroke="' + T.ink + '" stroke-width="2.5" fill="none" stroke-linecap="round"/>'
        : '<ellipse cx="120" cy="104" rx="4" ry="3" fill="' + T.ink + '"/>');
    var extras = '';
    if (variant === 'hungry') {
      extras = '<ellipse cx="225" cy="150" rx="34" ry="12" fill="' + NIGHT_DEEP + '"/><ellipse cx="225" cy="146" rx="34" ry="10" fill="' + NIGHT_SOFT + '"/>' +
        '<path d="M215 120 Q225 108 235 120" stroke="' + T.milk + '" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>';
    }
    if (variant === 'fish' || variant === 'yum') {
      extras += '<ellipse cx="222" cy="128" rx="26" ry="13" fill="' + T.lamp + '"/><path d="M244 128 L262 116 L262 140 Z" fill="' + T.lamp + '"/><circle cx="212" cy="125" r="2.5" fill="' + T.ink + '"/>';
    }
    if (variant === 'fish') {
      extras += '<path d="M158 88 Q166 84 162 76 M170 94 Q178 90 174 82" stroke="' + T.milk + '" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>';
    }
    if (variant === 'yum') {
      extras += '<path d="M186 128 Q172 118 158 112" stroke="' + T.lamp + '" stroke-width="3" stroke-dasharray="6 6" fill="none" stroke-linecap="round" opacity="0.8"/>';
    }
    if (variant === 'happy') {
      extras += '<g transform="rotate(12 165 72)"><circle cx="160" cy="68" r="5.5" fill="' + T.lamp + '"/><circle cx="170" cy="68" r="5.5" fill="' + T.lamp + '"/><path d="M154.5 70 L175.5 70 L165 84 Z" fill="' + T.lamp + '"/></g>';
    }
    SCENES['cat' + variant.charAt(0).toUpperCase() + variant.slice(1)] = svg(
      '<rect width="300" height="190" fill="' + T.night + '" rx="20"/>' + starDots() + cat + extras
    );
  });

  // Farm scenes: night barn silhouette at the left, one animal spotlit with
  // the gold ring per page; the sleep page shows all three asleep + moon.
  (function buildFarm() {
    var ring = function (cx, cy, r) { return '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" stroke="' + T.lamp + '" stroke-width="3.5" fill="none"/>'; };
    var eyes = function (x1, x2, y, closed) {
      return closed
        ? '<path d="M' + (x1 - 3) + ' ' + y + ' Q' + x1 + ' ' + (y + 3) + ' ' + (x1 + 3) + ' ' + y + ' M' + (x2 - 3) + ' ' + y + ' Q' + x2 + ' ' + (y + 3) + ' ' + (x2 + 3) + ' ' + y + '" stroke="' + T.ink + '" stroke-width="2" fill="none" stroke-linecap="round"/>'
        : '<circle cx="' + x1 + '" cy="' + y + '" r="2.5" fill="' + T.ink + '"/><circle cx="' + x2 + '" cy="' + y + '" r="2.5" fill="' + T.ink + '"/>';
    };
    var barn = function (asleep) {
      return '<rect x="24" y="86" width="64" height="56" rx="4" fill="' + NIGHT_DEEP + '"/>' +
        '<path d="M18 90 L56 62 L94 90 Z" fill="' + NIGHT_DEEP + '"/>' +
        '<rect x="48" y="104" width="16" height="16" rx="3" fill="' + (asleep ? NIGHT_SOFT : T.lamp) + '"/>' +
        '<rect x="16" y="142" width="268" height="5" rx="2.5" fill="' + NIGHT_SOFT + '"/>';
    };
    var cow = function (asleep) {
      return '<rect x="160" y="92" width="76" height="42" rx="18" fill="' + T.milk + '"/>' +
        '<ellipse cx="188" cy="108" rx="12" ry="9" fill="' + T.ink + '" opacity="0.85"/>' +
        '<circle cx="234" cy="88" r="22" fill="' + T.milk + '"/>' +
        '<path d="M216 72 L222 60 L230 72 Z" fill="' + T.milk + '"/>' +
        '<path d="M252 72 L246 60 L238 72 Z" fill="' + T.milk + '"/>' +
        '<ellipse cx="234" cy="98" rx="10" ry="7" fill="#E8AD84"/>' +
        eyes(228, 242, 84, asleep) +
        '<rect x="168" y="130" width="7" height="14" rx="3" fill="' + T.milk + '"/>' +
        '<rect x="216" y="130" width="7" height="14" rx="3" fill="' + T.milk + '"/>' +
        (asleep ? '' : ring(210, 100, 58));
    };
    var duck = function (asleep) {
      return '<ellipse cx="200" cy="132" rx="52" ry="12" fill="' + NIGHT_DEEP + '"/>' +
        '<ellipse cx="200" cy="118" rx="24" ry="15" fill="' + T.lamp + '"/>' +
        '<circle cx="220" cy="100" r="12" fill="' + T.lamp + '"/>' +
        '<path d="M231 98 L244 102 L231 106 Z" fill="#F2A93B"/>' +
        (asleep
          ? '<path d="M215 97 Q218 100 221 97" stroke="' + T.ink + '" stroke-width="2" fill="none" stroke-linecap="round"/>'
          : '<circle cx="221" cy="97" r="2.5" fill="' + T.ink + '"/>' +
            '<ellipse cx="200" cy="132" rx="34" ry="7" stroke="' + T.milk + '" stroke-width="2" fill="none" opacity="0.5"/>' +
            ring(206, 112, 46));
    };
    var dog = function (asleep) {
      return '<ellipse cx="196" cy="124" rx="34" ry="20" fill="' + T.coral + '"/>' +
        '<circle cx="228" cy="102" r="18" fill="' + T.coral + '"/>' +
        '<ellipse cx="216" cy="92" rx="6" ry="11" fill="' + T.coral + '" transform="rotate(-24 216 92)"/>' +
        '<ellipse cx="240" cy="92" rx="6" ry="11" fill="' + T.coral + '" transform="rotate(24 240 92)"/>' +
        '<ellipse cx="230" cy="110" rx="5" ry="4" fill="' + T.ink + '"/>' +
        eyes(222, 236, 100, asleep) +
        '<path d="M164 118 Q150 106 156 96" stroke="' + T.coral + '" stroke-width="7" fill="none" stroke-linecap="round"/>' +
        (asleep ? '' : ring(206, 110, 50));
    };
    var base = function (asleep) {
      return '<rect width="300" height="190" fill="' + T.night + '" rx="20"/>' + starDots() + barn(asleep);
    };
    SCENES.farmCow = svg(base(false) + cow(false));
    SCENES.farmDuck = svg(base(false) + duck(false));
    SCENES.farmDog = svg(base(false) + dog(false));
    SCENES.farmSleep = svg(base(true) +
      '<path d="M232 34 A22 22 0 1 0 254 60 A17 17 0 0 1 232 34 Z" fill="' + T.lamp + '"/>' +
      '<g transform="translate(-42 26) scale(0.62)">' + cow(true) + '</g>' +
      '<g transform="translate(-58 74) scale(0.62)">' + duck(true) + '</g>' +
      '<g transform="translate(28 60) scale(0.62)">' + dog(true) + '</g>');
  })();

  // Peekaboo-only scenes (the eyes/nose pages reuse the baby scenes above).
  (function buildPeekaboo() {
    var face = '<circle cx="150" cy="95" r="42" fill="' + T.skin + '"/>' +
      '<path d="M118 78 Q150 62 182 78 Q150 70 118 78" fill="' + T.ink + '"/>' +
      '<circle cx="136" cy="92" r="4" fill="' + T.ink + '"/><circle cx="164" cy="92" r="4" fill="' + T.ink + '"/>' +
      '<ellipse cx="150" cy="104" rx="5" ry="4" fill="#E8AD84"/>';
    var bg = '<rect width="300" height="190" fill="' + T.night + '" rx="20"/>' + starDots();
    SCENES.babyBoo = svg(bg + face +
      '<ellipse cx="103" cy="92" rx="14" ry="17" fill="' + T.skin + '" transform="rotate(-18 103 92)"/>' +
      '<ellipse cx="197" cy="92" rx="14" ry="17" fill="' + T.skin + '" transform="rotate(18 197 92)"/>' +
      '<path d="M96 66 L102 72 M110 60 L114 68" stroke="' + T.lamp + '" stroke-width="3" stroke-linecap="round"/>' +
      '<path d="M204 66 L198 72 M190 60 L186 68" stroke="' + T.lamp + '" stroke-width="3" stroke-linecap="round"/>' +
      '<path d="M138 112 Q150 124 162 112" stroke="' + T.ink + '" stroke-width="3.5" fill="none" stroke-linecap="round"/>');
    SCENES.babySmile = svg(bg + face +
      '<path d="M130 108 Q150 128 170 108" stroke="' + T.ink + '" stroke-width="4" fill="none" stroke-linecap="round"/>' +
      '<circle cx="150" cy="95" r="56" stroke="' + T.lamp + '" stroke-width="3" fill="none" stroke-dasharray="10 12" opacity="0.8"/>' +
      '<circle cx="150" cy="37" r="7" fill="' + T.lamp + '"/>');
  })();

  // ---- Rendering ----
  var idleEl = document.getElementById('idle');
  var readingEl = document.getElementById('reading');
  var scenePane = document.getElementById('scenePane');
  var bookTitleEl = document.getElementById('bookTitle');
  var sentenceEl = document.getElementById('sentence');
  var phoneticEl = document.getElementById('phonetic');
  var promptEl = document.getElementById('prompt');
  var hiLineEl = document.getElementById('hiLine');
  var pageDotsEl = document.getElementById('pageDots');
  var celebrateEl = document.getElementById('celebrate');
  var copycatEl = document.getElementById('copycat');
  var copycatCat = document.getElementById('copycatCat');
  var copycatBubble = document.getElementById('copycatBubble');
  var copycatPromptEl = document.getElementById('copycatPrompt');
  var copycatTimer = null;

  // Build the 6 burst particles once, matching the phone app's animation.
  (function setupParticles() {
    var count = 6;
    for (var i = 0; i < count; i++) {
      var angle = (i / count) * Math.PI * 2;
      var dx = Math.cos(angle) * 130;
      var dy = Math.sin(angle) * 130;
      var el = document.createElement('div');
      el.className = 'particle';
      el.style.setProperty('--to', 'translate(' + dx + 'px, ' + dy + 'px)');
      el.innerHTML = '<svg viewBox="0 0 40 40"><path d="M20 2 L24 16 L38 20 L24 24 L20 38 L16 24 L2 20 L16 16 Z" fill="' + (i % 2 === 0 ? T.lamp : T.coral) + '"/></svg>';
      celebrateEl.appendChild(el);
    }
  })();

  // A single shared <audio> element for both the celebration chime and the
  // narration clips. Two separate <audio> elements previously fought each
  // other for the Chromecast's audio decoding resources whenever a
  // celebration and a narration preload landed close together (e.g.
  // celebrating a page and preloading the next one) - one shared element
  // makes that race impossible by construction.
  var sfxAudio = document.getElementById('sfxAudio');
  var sfxLoaded = null; // key of whatever's currently loaded/loading in sfxAudio
  var narratePreloadKey = null; // book+page we'd like preloaded once sfxAudio is free

  function setPreservePitch(on) {
    try {
      if ('preservesPitch' in sfxAudio) sfxAudio.preservesPitch = on;
      sfxAudio.mozPreservesPitch = on;
      sfxAudio.webkitPreservesPitch = on;
    } catch (e) {}
  }

  function playSfx(key, src) {
    // Narration/trick clips play at their natural pitch (echo playback below
    // is the only thing that speeds up for the cat effect).
    sfxAudio.playbackRate = 1.0;
    setPreservePitch(true);
    var tryPlay = function () {
      var playPromise = sfxAudio.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(function (err) { console.error('[sfx] play failed', key, err); });
      }
    };
    if (sfxLoaded === key && sfxAudio.readyState >= 3) { tryPlay(); return; }
    sfxLoaded = key;
    sfxAudio.pause();
    sfxAudio.onerror = function () { console.error('[sfx] failed to load', key, sfxAudio.error); };
    sfxAudio.oncanplay = function () { sfxAudio.oncanplay = null; tryPlay(); };
    sfxAudio.src = src;
    sfxAudio.load();
  }

  function celebrate() {
    playSfx('celebrate', 'celebrate.wav');
    celebrateEl.classList.add('burst');
    setTimeout(function () { celebrateEl.classList.remove('burst'); }, 900);
  }

  // Once whatever's playing finishes, pick up any narration preload that
  // got deferred while the element was busy (see preloadNarration below).
  sfxAudio.addEventListener('ended', function () {
    if (typeof copycatCat !== 'undefined' && copycatCat) copycatCat.classList.remove('talking');
    if (narratePreloadKey && sfxLoaded !== narratePreloadKey) {
      var parts = narratePreloadKey.replace('narrate:', '').split('-');
      preloadNarration(parts[0], Number(parts[1]));
    }
  });

  function narrateSrc(book, page) { return 'narrate/' + book + '-' + page + '.wav'; }

  // Called on every page-sync message, well before "Listen first" is ever
  // tapped, so the file is usually already buffered by the time it's
  // needed. Skipped while the shared audio element is busy with something
  // else (e.g. a celebration just fired) so it never interrupts that -
  // speak() below will fall back to a fresh load if this never got to run.
  function preloadNarration(book, page) {
    if (!book || typeof page !== 'number') return;
    var key = 'narrate:' + book + '-' + page;
    narratePreloadKey = key;
    if (sfxLoaded === key) return; // already loaded/loading this exact clip
    if (!sfxAudio.paused) return; // busy actively playing something else - don't interrupt it
    sfxLoaded = key;
    sfxAudio.oncanplay = null;
    sfxAudio.src = narrateSrc(book, page);
    sfxAudio.load();
  }

  function speak(book, page) {
    if (!book || typeof page !== 'number') return;
    playSfx('narrate:' + book + '-' + page, narrateSrc(book, page));
  }

  function renderPage(data) {
    copycatExit();
    idleEl.style.opacity = '0';
    setTimeout(function () { idleEl.style.display = 'none'; }, 500);
    readingEl.classList.add('visible');
    preloadNarration(data.book, data.page);

    scenePane.innerHTML = SCENES[data.scene] || SCENES.moon;
    bookTitleEl.textContent = data.bookTitle || '';
    phoneticEl.textContent = '🔈 ' + (data.phonetic || '');
    promptEl.textContent = data.prompt || '';
    hiLineEl.textContent = data.hi ? (data.hi + ' — ' + (data.hiTrans || '')) : '';

    var words = data.words || [];
    var target = (data.targetWord || '').toLowerCase().replace(/[.,!?]/g, '');
    var hlIndex = typeof data.hlWord === 'number' ? data.hlWord : -1;
    sentenceEl.innerHTML = words.map(function (w, i) {
      var clean = w.toLowerCase().replace(/[.,!?]/g, '');
      var cls = 'word' + (i === hlIndex ? ' hl' : '') + (clean === target ? ' target' : '');
      return '<span class="' + cls + '">' + w + '</span>';
    }).join(' ');

    if (typeof data.page === 'number' && typeof data.pageCount === 'number') {
      var dots = '';
      for (var i = 0; i < data.pageCount; i++) {
        dots += '<span class="' + (i === data.page ? 'active' : '') + '"></span>';
      }
      pageDotsEl.innerHTML = dots;
    }
  }

  function renderIdle() {
    readingEl.classList.remove('visible');
    copycatEl.classList.remove('visible');
    idleEl.style.display = 'flex';
    idleEl.style.opacity = '1';
  }

  // ---- Copycat: Mochi the cat mirrors the phone's echo game on the TV ----
  // The cat speaks from the TV via the Web Speech API when this device has
  // voices; if it doesn't, we tell the phone (copycatCaps) so it speaks the
  // line itself instead. The TV always owns the visuals — mouth flap while
  // talking, a speech bubble of what was heard, and the trick animations.
  var ttsReady = false;
  var ttsVoice = null;
  var lastSenderId = undefined;

  function refreshVoices() {
    if (!('speechSynthesis' in window)) return;
    var voices = window.speechSynthesis.getVoices() || [];
    if (!voices.length) return;
    var wasReady = ttsReady;
    ttsVoice = voices.filter(function (v) { return /^en/i.test(v.lang || ''); })[0] || voices[0];
    ttsReady = true;
    // Voices often load asynchronously — once they arrive, let the phone know
    // it can hand the voice over to the TV.
    if (!wasReady) reportCaps();
  }

  function reportCaps() {
    try { context.sendCustomMessage(NAMESPACE, lastSenderId, { type: 'copycatCaps', canSpeak: ttsReady }); } catch (e) {}
  }

  function catSpeak(text) {
    if (!ttsReady || !text) return;
    try {
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.pitch = 2.0; u.rate = 0.95; u.lang = 'en-US';
      if (ttsVoice) u.voice = ttsVoice;
      window.speechSynthesis.speak(u);
    } catch (e) {}
  }

  if ('speechSynthesis' in window) {
    refreshVoices();
    window.speechSynthesis.onvoiceschanged = refreshVoices;
  }

  function copycatSvg() {
    return '<svg viewBox="0 0 200 200">' +
      '<path d="M150 168 Q188 158 178 118" stroke="' + T.coral + '" stroke-width="16" fill="none" stroke-linecap="round"/>' +
      '<ellipse cx="100" cy="158" rx="60" ry="40" fill="' + T.coral + '"/>' +
      '<ellipse cx="100" cy="168" rx="34" ry="22" fill="' + T.milk + '" opacity="0.9"/>' +
      '<path d="M58 66 L48 24 L92 52 Z" fill="' + T.coral + '"/>' +
      '<path d="M142 66 L152 24 L108 52 Z" fill="' + T.coral + '"/>' +
      '<circle cx="100" cy="96" r="52" fill="' + T.coral + '"/>' +
      '<circle cx="66" cy="108" r="13" fill="' + T.milk + '" opacity="0.35"/>' +
      '<circle cx="134" cy="108" r="13" fill="' + T.milk + '" opacity="0.35"/>' +
      '<circle cx="80" cy="90" r="12" fill="' + T.milk + '"/>' +
      '<circle cx="120" cy="90" r="12" fill="' + T.milk + '"/>' +
      '<circle cx="82" cy="92" r="6" fill="' + T.ink + '"/>' +
      '<circle cx="118" cy="92" r="6" fill="' + T.ink + '"/>' +
      '<path d="M94 106 L106 106 L100 113 Z" fill="' + T.ink + '"/>' +
      '<path class="cat-mouth-closed" d="M100 113 L100 120 M100 120 Q90 129 82 121 M100 120 Q110 129 118 121" stroke="' + T.ink + '" stroke-width="3" fill="none" stroke-linecap="round"/>' +
      '<ellipse class="cat-mouth-open" cx="100" cy="124" rx="11" ry="9" fill="' + T.ink + '"/>' +
      '<g stroke="' + T.ink + '" stroke-width="2.2" stroke-linecap="round" opacity="0.7">' +
      '<path d="M60 110 L28 104 M60 118 L30 120" fill="none"/><path d="M140 110 L172 104 M140 118 L170 120" fill="none"/></g>' +
      '</svg>';
  }

  function setCopycatPrompt(word, label) {
    copycatPromptEl.innerHTML = 'Say <b>\u201C' + (word || '') + '\u201D</b> to make me ' + (label || '').toLowerCase() + '!';
  }

  function copycatEnter(word, label) {
    idleEl.style.opacity = '0';
    setTimeout(function () { idleEl.style.display = 'none'; }, 500);
    readingEl.classList.remove('visible');
    if (!copycatCat.firstChild) copycatCat.innerHTML = copycatSvg();
    setCopycatPrompt(word, label);
    copycatBubble.classList.remove('show');
    copycatEl.classList.add('visible');
  }

  function copycatSpeak(text) {
    // Visuals only — the audio is streamed separately (copycatEcho*) and
    // played by playEcho, since a basic Chromecast can't synthesize speech.
    copycatBubble.textContent = '\u201C' + (text || '') + '\u201D';
    copycatBubble.classList.add('show');
    copycatCat.classList.add('talking');
    clearTimeout(copycatTimer);
    var dur = Math.max(900, Math.min(6000, (text || '').length * 90));
    copycatTimer = setTimeout(function () { copycatCat.classList.remove('talking'); }, dur);
  }

  function copycatAction(action, say, audioFromPhone) {
    if (say) { copycatBubble.textContent = say; copycatBubble.classList.add('show'); }
    // Only play bundled WAV when the phone is NOT streaming natural audio.
    // Treat any truthy value as "phone owns audio" (covers boolean true / "true").
    var phoneOwnsAudio = !!audioFromPhone && audioFromPhone !== 'false' && audioFromPhone !== '0';
    if (!phoneOwnsAudio) {
      playSfx('copycat:' + action, 'copycat/' + action + '.wav');
    } else {
      // Stop any leftover clip so we never stack WAV + natural MP3.
      try { sfxAudio.pause(); } catch (e) {}
    }
    copycatCat.classList.add('talking');
    var cls = 'act-' + action;
    copycatCat.classList.remove('act-jump', 'act-spin', 'act-dance', 'act-meow');
    void copycatCat.offsetWidth; // reflow so replaying the same trick restarts the animation
    copycatCat.classList.add(cls);
    copycatCat.addEventListener('animationend', function handler() {
      copycatCat.classList.remove(cls);
      copycatCat.removeEventListener('animationend', handler);
    });
    clearTimeout(copycatTimer);
    copycatTimer = setTimeout(function () { copycatCat.classList.remove('talking'); }, phoneOwnsAudio ? 3500 : 1300);
  }

  // Visuals only — phone streams natural voice separately (avoids double audio
  // with old receivers that always played the WAV on copycatAction).
  function copycatTrick(action, say) {
    copycatAction(action, say, true);
  }

  function copycatExit() {
    copycatCat.classList.remove('talking');
    copycatBubble.classList.remove('show');
    copycatEl.classList.remove('visible');
  }

  // Live echo audio streamed from the phone (basic Chromecast can't synthesize
  // speech, so the phone records the utterance and sends the WAV in base64
  // chunks). We reassemble it and play it back sped up for the cat voice.
  var echoBuffers = {};

  function playEcho(dataUri) {
    sfxLoaded = 'echo';
    sfxAudio.pause();
    // Pitch is baked into the streamed WAV by the phone, so play it normally.
    sfxAudio.playbackRate = 1.0;
    setPreservePitch(true);
    copycatCat.classList.add('talking');
    sfxAudio.onerror = function () { copycatCat.classList.remove('talking'); };
    sfxAudio.oncanplay = function () {
      sfxAudio.oncanplay = null;
      var p = sfxAudio.play();
      if (p && typeof p.catch === 'function') p.catch(function () {});
    };
    sfxAudio.src = dataUri;
    sfxAudio.load();
  }

  // Natural OpenAI storyteller audio streamed from the phone as MP3 chunks
  // (same channel pattern as copycat echo). Replaces the old robotic narrate/
  // Web Speech path for reading + Jugnu while casting.
  var naturalBuffers = {};

  function playNaturalAudio(dataUri) {
    sfxLoaded = 'natural';
    sfxAudio.pause();
    sfxAudio.playbackRate = 1.0;
    setPreservePitch(true);
    sfxAudio.onerror = function () { console.error('[natural] play failed', sfxAudio.error); };
    sfxAudio.oncanplay = function () {
      sfxAudio.oncanplay = null;
      var p = sfxAudio.play();
      if (p && typeof p.catch === 'function') p.catch(function (err) { console.error('[natural] play()', err); });
    };
    sfxAudio.src = dataUri;
    sfxAudio.load();
  }

  function stopNaturalAudio() {
    if (sfxLoaded === 'natural' || (sfxLoaded && String(sfxLoaded).indexOf('natural:') === 0)) {
      try { sfxAudio.pause(); sfxAudio.removeAttribute('src'); sfxAudio.load(); } catch (e) {}
      sfxLoaded = null;
    }
  }

  var context = cast.framework.CastReceiverContext.getInstance();
  context.addCustomMessageListener(NAMESPACE, function (event) {
    var data = event.data;
    if (event.senderId) lastSenderId = event.senderId;
    if (!data || data.type === 'idle') {
      renderIdle();
    } else if (data.type === 'page') {
      renderPage(data);
    } else if (data.type === 'celebrate') {
      celebrate();
    } else if (data.type === 'speak') {
      // Legacy pre-recorded WAV — kept as offline fallback if the phone
      // couldn't stream natural audio.
      speak(data.book, data.page);
    } else if (data.type === 'naturalSpeakStart') {
      naturalBuffers[data.id] = { total: data.total, parts: [], mime: data.mime || 'audio/mpeg' };
    } else if (data.type === 'naturalSpeakChunk') {
      var nbuf = naturalBuffers[data.id];
      if (nbuf) nbuf.parts[data.i] = data.data;
    } else if (data.type === 'naturalSpeakEnd') {
      var nb = naturalBuffers[data.id];
      if (nb) {
        playNaturalAudio('data:' + (nb.mime || 'audio/mpeg') + ';base64,' + nb.parts.join(''));
        delete naturalBuffers[data.id];
      }
    } else if (data.type === 'naturalSpeakStop') {
      stopNaturalAudio();
    } else if (data.type === 'copycatEnter') {
      copycatEnter(data.promptWord, data.promptLabel);
      reportCaps();
    } else if (data.type === 'copycatPrompt') {
      setCopycatPrompt(data.promptWord, data.promptLabel);
    } else if (data.type === 'copycatSpeak') {
      copycatSpeak(data.text);
    } else if (data.type === 'copycatAction') {
      copycatAction(data.action, data.say, data.audioFromPhone);
    } else if (data.type === 'copycatTrick') {
      copycatTrick(data.action, data.say);
    } else if (data.type === 'copycatEchoStart') {
      echoBuffers[data.id] = { total: data.total, parts: [] };
    } else if (data.type === 'copycatEchoChunk') {
      var buf = echoBuffers[data.id];
      if (buf) buf.parts[data.i] = data.data;
    } else if (data.type === 'copycatEchoEnd') {
      var b = echoBuffers[data.id];
      if (b) { playEcho('data:audio/wav;base64,' + b.parts.join('')); delete echoBuffers[data.id]; }
    } else if (data.type === 'copycatExit') {
      copycatExit();
      renderIdle();
    }
  });

  var options = new cast.framework.CastReceiverOptions();
  options.disableIdleTimeout = true;
  context.start(options);
</script>
</body>
</html>
